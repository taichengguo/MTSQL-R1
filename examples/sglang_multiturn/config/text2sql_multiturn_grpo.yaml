hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  max_prompt_length: 4096
  max_response_length: 3000
  train_batch_size: 256
  return_raw_chat: True


actor_rollout_ref:
  hybrid_engine: True
  rollout:
    name: sglang
    multi_turn:
      enable: True
      max_assistant_turns: 4   # Important Max-turns
      tool_config_path: "./config/tool_config/text2sql_tool_config.yaml"
